<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiceRoll Sync</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #e0e0e0);
            min-height: 100vh;
            padding: 16px;
        }
        .dice-btn {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 4px;
            min-width: 80px;
        }
        .result-box {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            text-align: center;
        }
        .result-total {
            font-size: 3rem;
            font-weight: bold;
            color: #0d6efd;
        }
        .result-detail {
            font-size: 1.1rem;
            color: #aaa;
            margin-top: 8px;
        }
        .roll-badge {
            font-size: 1.2rem;
            padding: 8px 12px;
            margin: 4px;
        }
        .custom-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--tg-theme-text-color, #fff);
        }
        .custom-input::placeholder {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h4 class="text-center mb-3">🎲 DiceRoll Sync</h4>

        <!-- Быстрые кнопки -->
        <div class="d-flex flex-wrap justify-content-center mb-3">
            <button class="btn btn-primary dice-btn" onclick="roll('d4')">d4</button>
            <button class="btn btn-primary dice-btn" onclick="roll('d6')">d6</button>
            <button class="btn btn-primary dice-btn" onclick="roll('d8')">d8</button>
            <button class="btn btn-primary dice-btn" onclick="roll('d10')">d10</button>
            <button class="btn btn-primary dice-btn" onclick="roll('d12')">d12</button>
            <button class="btn btn-primary dice-btn" onclick="roll('d20')">d20</button>
            <button class="btn btn-primary dice-btn" onclick="roll('d100')">d100</button>
        </div>

        <!-- Кастомный бросок -->
        <div class="input-group mb-3">
            <input type="text" id="custom-roll" class="form-control custom-input" placeholder="2d6+7, 3d20-2...">
            <button class="btn btn-success" onclick="customRoll()">Бросить</button>
        </div>

        <!-- Результат -->
        <div id="result" class="result-box" style="display:none;">
            <div id="result-notation" class="text-muted"></div>
            <div id="result-total" class="result-total"></div>
            <div id="result-detail" class="result-detail"></div>
            <div id="result-badges" class="mt-2"></div>
        </div>

        <!-- История бросков в Web App -->
        <h6 class="mt-4 mb-2">📜 Мои броски</h6>
        <div id="history" class="d-flex flex-column gap-2" style="max-height: 30vh; overflow-y: auto;"></div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Получаем имя пользователя из Telegram
        const userName = tg.initDataUnsafe?.user
            ? tg.initDataUnsafe.user.first_name + (tg.initDataUnsafe.user.last_name ? ' ' + tg.initDataUnsafe.user.last_name : '')
            : "Игрок";

        // ─── Бросок кубика ─────────────────────────────────────
        async function roll(expression) {
            try {
                const response = await fetch("/api/roll", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        player_name: userName,
                        expression: expression
                    })
                });

                const data = await response.json();

                if (data.error) {
                    tg.showAlert("Ошибка: " + data.error);
                    return;
                }

                showResult(data);
                addToHistory(data);

                // Вибрация при критических значениях
                if (data.rolls.length === 1) {
                    if (data.rolls[0] === parseInt(expression.replace('d', ''))) {
                        tg.HapticFeedback.notificationOccurred('success');
                    } else if (data.rolls[0] === 1) {
                        tg.HapticFeedback.notificationOccurred('error');
                    } else {
                        tg.HapticFeedback.impactOccurred('medium');
                    }
                }
            } catch (e) {
                tg.showAlert("Ошибка соединения: " + e.message);
            }
        }

        function customRoll() {
            const input = document.getElementById("custom-roll");
            const expr = input.value.trim();
            if (!expr) return;
            roll(expr);
            input.value = "";
        }

        // ─── Показ результата ──────────────────────────────────
        function showResult(data) {
            document.getElementById("result").style.display = "block";
            document.getElementById("result-notation").textContent = data.dice_notation;
            document.getElementById("result-total").textContent = data.total;
            document.getElementById("result-detail").textContent = data.detail;

            // Бейджи для каждого кубика
            const badges = data.rolls.map(r => {
                let color = "bg-secondary";
                if (r === 20) color = "bg-warning text-dark";
                if (r === 1) color = "bg-danger";
                return `<span class="badge ${color} roll-badge">${r}</span>`;
            }).join("");
            document.getElementById("result-badges").innerHTML = badges;
        }

        // ─── История ───────────────────────────────────────────
        function addToHistory(data) {
            const history = document.getElementById("history");
            const time = new Date().toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });

            const html = `
                <div class="d-flex justify-content-between align-items-center p-2" style="background:rgba(255,255,255,0.05);border-radius:8px;">
                    <span class="text-muted small">${data.dice_notation} • ${time}</span>
                    <strong>${data.total}</strong>
                </div>
            `;
            history.insertAdjacentHTML("afterbegin", html);
        }

        // Enter для кастомного броска
        document.getElementById("custom-roll").addEventListener("keypress", (e) => {
            if (e.key === "Enter") customRoll();
        });
    </script>
</body>
</html>
